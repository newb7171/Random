name: Proton wcp 

on:
  workflow_dispatch:

env:
  BUILD_DIR: /tmp/build_wine

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Update system
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt --fix-broken install -y

      - name: Install build dependencies
        run: |
          export BASE_DEPS="\
            debootstrap \
            perl \
            git \
            wget \
            xz-utils \
            bubblewrap \
            autoconf \
            flex \
            bison \
            gcc-multilib \
            g++-multilib \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libxrender-dev \
            libxinerama-dev \
            libgl-dev \
            libsdl2-dev \
            libglu-dev \
            libosmesa6-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpcap-dev \
            libdbus-1-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libcups2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libxml2-dev \
            libvulkan-dev \
            vulkan-tools \
            libvulkan1 \
            mesa-vulkan-drivers \
            mingw-w64 \
            gettext \
            libgettextpo-dev"

          sudo apt-get install -y $BASE_DEPS

      - name: Install multimedia dependencies
        run: |
          sudo apt-get install -y \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libmpg123-dev \
            libopenal-dev

          sudo apt-get install -y gstreamer1.0-*

      - name: Clone Wine source
        run: |
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"

          git clone https://github.com/ValveSoftware/wine
          cd wine

          git log -1 --oneline

      - name: Patch Winlator tmp paths
        working-directory: /tmp/build_wine/wine
        run: |
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) \
            -exec grep -l "/tmp" {} \; \
            | \
            xargs -r sed -i 's|/tmp/|/data/data/com.winlator/files/imagefs/usr/tmp/|g'

          find server -type f \( -name "*.c" -o -name "*.h" \) \
            -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/imagefs/usr/tmp"|g' {} +

          find . \
            -name "file.c" \
            -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/imagefs/usr/tmp"|g' {} +

          find . \
            -name "loader.c" \
            -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/imagefs/usr/tmp"|g' {} +

          find . \
            -name "server.c" \
            -exec sed -i 's|"/tmp"|"/data/data/com.winlator/files/imagefs/usr/tmp"|g' {} +

      - name: Generate configure script
        working-directory: /tmp/build_wine/wine
        run: |
          ./autogen.sh || true

      - name: Configure Wine
        working-directory: /tmp/build_wine/wine
        run: |
          export CROSSCC="x86_64-w64-mingw32-gcc"
          export CROSSCXX="x86_64-w64-mingw32-g++"

          export CFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"

          mkdir -p build-wow64
          cd build-wow64

          ../configure \
            --enable-win64 \
            --enable-archs=i386,x86_64 \
            --prefix=/tmp/wine-install-proton \
            --with-x \
            --with-vulkan \
            --with-alsa \
            --with-pulse \
            --with-freetype \
            --with-fontconfig \
            --with-gstreamer \
            --with-gettext \
            --with-sdl \
            --enable-nls \
            --disable-winemenubuilder \
            --disable-win16 \
            --disable-tests \
            --without-ldap \
            --without-capi \
            --without-oss \
            --without-cups \
            --without-dbus \
            --without-coreaudio \
            --without-gphoto \
            --without-osmesa \
            --without-sane \
            --without-pcap \
            --without-pcsclite \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland

      - name: Build Wine
        working-directory: /tmp/build_wine/wine/build-wow64
        run: |
          make -j"$(nproc)"
          make install

      - name: Prepare package
        run: |
          COMMIT_HASH=$(cd /tmp/build_wine/wine && git rev-parse --short HEAD)
          BUILD_NAME="wine-latest-${COMMIT_HASH}-wow64-xuser"
          echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"

          # Setup structure inside 'package' directory using a literal dot path
          mkdir -p "package/."
          
          # Copy everything from install target (includes share, bin, lib, etc.)
          cp -a /tmp/wine-install-proton/. "package/./"
          
          # Remove the include folder completely
          rm -rf "package/./include"
          
          # Inject prefixPack.txz directly into the root level alongside lib, bin, and share
          wget -q "https://github.com/newb7171/Random/releases/download/prefix/prefixPack.txz" -O "package/./prefixPack.txz"

          # Download profile.txt and convert it into profile.json directly in the root level
          wget -q "https://github.com/newb7171/Random/releases/download/profile/profile.txt" -O "package/./profile.json"

      - name: Create archive
        run: |
          # Compress the directory into a Winlator Custom Package (.wcp) file
          tar --transform 's|^\.|.|' -cJf "${BUILD_NAME}.wcp" -C package . 
          ls -lh *.wcp

      - name: Generate checksums
        run: |
          sha256sum *.wcp > checksums.txt
          cat checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: |
            *.wcp
            checksums.txt
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_NAME }}
          name: ${{ env.BUILD_NAME }}
          files: |
            *.wcp
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
